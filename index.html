    <script>
        function handlePlayAction() {
            // الخطوة 1: Pop-under يشتغل أوتوماتيك بالضغطة

            // الخطوة 2: بعد ثانيتين اعرض الـ countdown overlay
            setTimeout(function() {
                showCountdown();
            }, 2000);
        }

        function showCountdown() {
            var overlay = document.getElementById('countdown-overlay');
            overlay.style.display = 'flex';

            var seconds = 5;
            var ring = document.getElementById('progress-ring');
            var numEl = document.getElementById('countdown-number');
            var circumference = 345.4;

            // ابدأ العداد
            var interval = setInterval(function() {
                seconds--;
                numEl.textContent = seconds;

                // تحديث الدائرة
                var offset = circumference * (1 - seconds / 5);
                ring.style.strokeDashoffset = offset;

                if (seconds <= 0) {
                    clearInterval(interval);

                    // الخطوة 3: افتح Smart Link في تاب جديد
                    window.open("https://www.profitablecpmratenetwork.com/p5j82sdxu?key=e5276935ca68cc1a0286990006c162ca", "_blank");
